<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 60" width="1000" height="60">
  <defs>
    <clipPath id="clip">
      <rect width="1000" height="60"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1000" height="60" fill="#C8202F"/>

  <!-- LEFT diamond cluster (stagger flipped) -->
  <g fill="#6e0f12" opacity="0.55" clip-path="url(#clip)">
    <!-- Row top (cy=0, x=0,60,120,180) -->
    <polygon points="0,-30 30,0 0,30 -30,0"/>
    <polygon points="60,-30 90,0 60,30 30,0"/>
    <polygon points="120,-30 150,0 120,30 90,0"/>
    <polygon points="180,-30 210,0 180,30 150,0"/>
    <!-- Row middle (cy=30, offset x by 30) -->
    <polygon points="30,0 60,30 30,60 0,30"/>
    <polygon points="90,0 120,30 90,60 60,30"/>
    <polygon points="150,0 180,30 150,60 120,30"/>
    <polygon points="210,0 240,30 210,60 180,30"/>
    <!-- Row bottom (cy=60, same x as top) -->
    <polygon points="0,30 30,60 0,90 -30,60"/>
    <polygon points="60,30 90,60 60,90 30,60"/>
    <polygon points="120,30 150,60 120,90 90,60"/>
    <polygon points="180,30 210,60 180,90 150,60"/>
  </g>

  <!-- RIGHT diamond cluster (mirrored) -->
  <g fill="#6e0f12" opacity="0.55" clip-path="url(#clip)">
    <!-- Row top (cy=0) -->
    <polygon points="1000,-30 1030,0 1000,30 970,0"/>
    <polygon points="940,-30 970,0 940,30 910,0"/>
    <polygon points="880,-30 910,0 880,30 850,0"/>
    <polygon points="820,-30 850,0 820,30 790,0"/>
    <!-- Row middle (cy=30, offset) -->
    <polygon points="970,0 1000,30 970,60 940,30"/>
    <polygon points="910,0 940,30 910,60 880,30"/>
    <polygon points="850,0 880,30 850,60 820,30"/>
    <polygon points="790,0 820,30 790,60 760,30"/>
    <!-- Row bottom (cy=60) -->
    <polygon points="1000,30 1030,60 1000,90 970,60"/>
    <polygon points="940,30 970,60 940,90 910,60"/>
    <polygon points="880,30 910,60 880,90 850,60"/>
    <polygon points="820,30 850,60 820,90 790,60"/>
  </g>
</svg>
