<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trackr</title>
    <link rel="stylesheet" href="asset/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <header>
        <h1>Budget Tracker</h1>
        <!-- <nav>
            <a href="dashboard.html">Dashboard</a>
            <a href="transaction.html">Transaction</a>
            <a href="budget.html">Budget</a>
            <a href="report.html">Report</a>
        </nav> -->
    </header>

    <section class="summary">
        <h2 class="summary-title">Summary</h2>
        <div class="summary-card">
            <div class="balance">
                <p class="label">Total Balance</p>
                <h2 id="total-balance">$0.00</h2>
                <p class="trend"> -> this month</p>
            </div>

            <div class="income">
                <p class="label">Total Income</p>
                <h2 id="total-income">$0.00</h2>
                <p class="trend"> -> this month</p>
            </div>

            <div class="expense">
                <p class="label">Total Expense</p>
                <h2 id="total-expense">$0.00</h2>
                <p class="trend">-> this month</p>
            </div>
        </div>

    </section>

    <section class="add-transaction">
        <h2>Add Transaction</h2>

        <form class="transaction-form">

            <input
                type="date"
                id="date"
                class="form-input"
                placeholder="Date"
            />

            <input
                type="text"
                id="description"
                class="form-input"
                placeholder="What was it for?"
            />

            <input
                type="number"
                id="amount"
                class="form-input"
                placeholder="Amount e.g. 40"
            />

            <select id="type" class="form-input">
                <option value="">Select Type</option>
                <option value="income">💰 Income</option>
                <option value="expense">🔴 Expense</option>
            </select>

            <select id="category" class="form-input">
                <option value="">Select Category</option>
                <option value="food">🍔 Food</option>
                <option value="transport">🚗 Transport</option>
                <option value="housing">🏠 Housing</option>
                <option value="shopping">🛍️ Shopping</option>
                <option value="income">💰 Income</option>
                <option value="other">📦 Other</option>
            </select>

            <button type="submit" class="form-btn">+ Add</button>
        </form>
    </section>

    <section class="transactions">
        <h2 class="transaction-title">Transactions</h2>
        <table>
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Description</th>
                    <th>Category</th>
                    <th>Type</th>
                    <th>Amount</th>
                </tr>
            </thead>
            <tbody id="transaction-body">
            </tbody>
        </table>
    </section>



</body>
</html>
