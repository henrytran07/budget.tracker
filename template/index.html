<!DOCTYPE html>
<html lang="en">
    
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE-edge"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trackr</title>
    <link rel="stylesheet" href="/asset/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">  
</head>
<header>
    <h1>Budget Tracker</h1>
    <nav>
        <a href="dashboard.html">Dashboard</a>
        <a href="transaction.html">Transaction</a>
        <a href="budget.html">Budget</a>
        <a href="report.html">Report</a>
    </nav>

</header>
<body>
    <h2>Summary</h2>
    <section class="summary">
        <div class="balance">
            <p class="label">Total Balance</p>
            <h2 class="amount">$2,000</h2>
            <p class="trend">↑ this month</p>
        </div>

        <div class="income">
            <p class="label">Total Income</p>
            <h2 class="amount">$3,000</h2>
            <p class="trend">↑ this month</p>
        </div>

        <div class="expense">
            <p class="label">Total Expense</p>
            <h2 class="amount">$600</h2>
            <p class="trend">↓ this month</p>
        </div>
    </section>

    <section class="add-transaction">
        <h2>Add Transaction</h2>
    
        <form class="transaction-form">

            <input 
                type="text" 
                class="form-input"
                placeholder="Description e.g. Groceries" 
            />

            <input 
                type="number" 
                class="form-input"
                placeholder="Amount e.g. 40" 
            />

            <select class="form-input">
                <option value="">Select Category</option>
                <option value="food">🍔 Food</option>
                <option value="transport">🚗 Transport</option>
                <option value="shopping">🛍️ Shopping</option>
                <option value="income">💰 Income</option>
                <option value="other">📦 Other</option>
            </select>

            <button type="submit" class="form-btn">+ Add</button>
        </form>
    </section>
</body>
</html>
